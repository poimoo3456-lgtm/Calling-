<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NattDev Universal Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for better look on Desktop */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* Ensure smooth scrolling on iOS */
        .scroll-smooth-ios {
            -webkit-overflow-scrolling: touch;
        }

        #main-content {
            height: calc(100vh - 64px);
        }

        @media (max-width: 768px) {
            #main-content {
                height: auto;
                flex-direction: column;
                overflow-y: auto;
            }
            .panel {
                height: 50vh;
                width: 100% !important;
            }
        }

        iframe {
            background: white;
            border: none;
            width: 100%;
            height: 100%;
        }

        /* Loading Animation */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 overflow-hidden font-sans">

    <!-- Navigation Bar -->
    <header class="h-16 border-b border-slate-800 flex items-center justify-between px-4 md:px-6 bg-slate-950 shadow-2xl z-50 sticky top-0">
        <div class="flex items-center gap-2 md:gap-3">
            <div class="w-8 h-8 md:w-10 md:h-10 bg-sky-500 rounded-lg flex items-center justify-center font-bold text-xl shadow-lg shadow-sky-900/20">T</div>
            <div>
                <h1 class="text-sm md:text-lg font-bold leading-none">NattDev <span class="text-sky-400 font-mono italic">Telegram</span></h1>
                <p class="text-[9px] text-slate-500 uppercase tracking-tighter mt-1 hidden sm:block">Multi-Platform Ready</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button id="send-btn" onclick="sendToTelegram()" class="flex items-center gap-2 bg-sky-600 hover:bg-sky-500 active:scale-95 text-xs md:text-sm font-bold py-2 px-4 md:px-6 rounded-full transition-all shadow-lg shadow-sky-900/40">
                <span id="btn-text">สร้าง & ส่ง Telegram</span>
                <div id="btn-loader" class="spinner hidden"></div>
            </button>
        </div>
    </header>

    <!-- Editor & Preview Container -->
    <main id="main-content" class="flex scroll-smooth-ios">
        
        <!-- Editor Section -->
        <div class="panel w-1/2 flex flex-col border-r border-slate-800 bg-slate-950">
            <div class="bg-slate-900/80 px-4 py-2 flex justify-between items-center text-[10px] text-slate-500 font-mono border-b border-slate-800">
                <span>CODE EDITOR (HTML)</span>
                <span class="text-sky-500">Auto-Preview On</span>
            </div>
            <textarea id="code-editor" spellcheck="false" class="flex-1 bg-transparent text-sky-300 p-4 md:p-6 font-mono text-xs md:text-sm outline-none resize-none leading-relaxed">
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My New App</title>
</head>
<body style="font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #0f172a; color: white;">
    <div style="text-align: center; padding: 20px; border: 1px solid #334155; border-radius: 20px; background: #1e293b;">
        <h1 style="color: #38bdf8;">สร้างสำเร็จแล้ว!</h1>
        <p style="color: #94a3b8;">ระบบพร้อมส่งแจ้งเตือนเข้า Telegram</p>
    </div>
</body>
</html></textarea>
        </div>

        <!-- Preview Section -->
        <div class="panel w-1/2 flex flex-col bg-white">
            <div class="bg-slate-100 px-4 py-2 text-[10px] text-slate-400 font-mono border-b border-slate-200">
                LIVE PREVIEW
            </div>
            <div class="flex-1 overflow-hidden">
                <iframe id="preview-frame"></iframe>
            </div>
        </div>
    </main>

    <!-- UI Notification (Toast) -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 md:left-auto md:right-6 md:translate-x-0 bg-slate-800 border border-slate-700 p-4 rounded-2xl shadow-2xl translate-y-32 transition-transform duration-500 flex items-center gap-3 z-[100] w-[90%] md:w-auto">
        <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center text-lg shrink-0"></div>
        <div class="overflow-hidden">
            <p class="font-bold text-xs md:text-sm" id="toast-title"></p>
            <p class="text-[10px] md:text-xs text-slate-400 truncate" id="toast-msg"></p>
        </div>
    </div>

    <script>
        const editor = document.getElementById('code-editor');
        const frame = document.getElementById('preview-frame');
        const toast = document.getElementById('toast');
        
        // Telegram Configuration
        const botToken = "8715194452:AAF9gs0ckTqt3D3bdZndmnJaA3zTo5Cb9To";
        const chatId = "-1003851736941"; // เติมเครื่องหมายลบสำหรับรหัสกลุ่ม

        let currentBlobUrl = "";

        // Function: Update Preview
        function updatePreview() {
            const code = editor.value;
            const blob = new Blob([code], { type: 'text/html' });
            if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
            currentBlobUrl = URL.createObjectURL(blob);
            frame.src = currentBlobUrl;
        }

        editor.addEventListener('input', updatePreview);

        // UI: Show Status Message
        function showToast(title, msg, type = 'success') {
            const icon = document.getElementById('toast-icon');
            icon.innerHTML = type === 'success' ? '✈️' : '⚠️';
            icon.className = `w-8 h-8 ${type === 'success' ? 'bg-sky-500/20 text-sky-500' : 'bg-red-500/20 text-red-500'} rounded-full flex items-center justify-center shrink-0`;
            
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('translate-y-32');
            setTimeout(() => toast.classList.add('translate-y-32'), 4000);
        }

        // Action: Send to Telegram
        async function sendToTelegram() {
            const btn = document.getElementById('send-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            
            // Start Loading
            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');

            const parser = new DOMParser();
            const doc = parser.parseFromString(editor.value, "text/html");
            const webTitle = doc.title || "Untitled Project";
            
            // Format Message
            const message = `🚀 *NattDev Builder Notice* 🚀\n\n` +
                            `📝 *ชื่อเว็บ:* ${webTitle}\n` +
                            `🔗 *ลิ้งค์ตัวอย่าง:* [Click to Preview](${currentBlobUrl})\n` +
                            `📱 *Platform:* ${navigator.platform}\n` +
                            `⏰ *เวลา:* ${new Date().toLocaleString('th-TH')}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                if (response.ok) {
                    showToast("ส่งสำเร็จ!", "ข้อมูลเว็บถูกส่งเข้ากลุ่ม Telegram แล้ว");
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.description || "API Error");
                }
            } catch (err) {
                console.error(err);
                showToast("ส่งไม่สำเร็จ", err.message, "error");
            } finally {
                // Stop Loading
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoader.classList.add('hidden');
            }
        }

        // Initialize preview
        window.onload = updatePreview;
        
        // Handle mobile viewport resizing (keyboard show/hide)
        window.addEventListener('resize', () => {
            if (window.innerWidth < 768) {
                // Mobile layout adjustments if needed
            }
        });
    </script>
</body>
</html>
