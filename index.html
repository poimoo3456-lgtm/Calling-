<head>

        <div class="flex items-center gap-2 md:gap-3">
            <div class="w-8 h-8 md:w-10 md:h-10 bg-indigo-600 rounded-lg flex items-center justify-center font-bold text-xl shadow-lg text-white font-mono">N</div>
            <div>
                <h1 class="text-sm md:text-lg font-bold leading-none text-indigo-400">NattDev <span class="text-slate-300">Deployer</span></h1>
                <p class="text-[9px] text-slate-500 uppercase tracking-tighter mt-1">API: 8504214576...xqI</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button id="send-btn" onclick="deployAndSend()" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-xs md:text-sm font-bold py-2 px-4 md:px-6 rounded-full transition-all shadow-lg shadow-indigo-900/40 text-white">
                <span id="btn-text">สร้างลิ้งก์ & ส่งข้อมูล</span>
                <div id="btn-loader" class="spinner hidden"></div>
            </button>
        </div>
    </header>

    <main id="main-content" class="flex">
        <!-- Editor Section -->
        <div class="panel w-1/2 flex flex-col border-r border-slate-800 bg-slate-950">
            <div class="bg-slate-900/80 px-4 py-2 flex justify-between items-center text-[10px] text-slate-500 font-mono border-b border-slate-800">
                <span>INDEX.HTML</span>
                <span id="status-debug" class="text-indigo-500 italic">พร้อมใช้งาน</span>
            </div>
            <textarea id="code-editor" spellcheck="false" class="flex-1 bg-transparent text-indigo-300 p-4 md:p-6 font-mono text-xs md:text-sm outline-none resize-none leading-relaxed">
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรเจกต์ใหม่</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-50 min-h-screen flex items-center justify-center p-6 font-sans">
    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl p-10 text-center">
        <div class="text-5xl mb-6">🔗</div>
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Deploy สำเร็จ!</h1>
        <p class="text-slate-500 mb-8">นี่คือหน้าเว็บที่สร้างจาก NattDev Builder ลิ้งก์นี้สามารถแชร์ให้คนอื่นดูได้ทันที</p>
        <div class="bg-indigo-600 text-white py-3 px-6 rounded-2xl font-bold shadow-lg shadow-indigo-200">
            NattDev Universal
        </div>
    </div>
</body>
</html></textarea>
        </div>

        <!-- Preview Section -->
        <div class="panel w-1/2 flex flex-col bg-white">
            <div class="bg-slate-100 px-4 py-2 text-[10px] text-slate-400 font-mono border-b border-slate-200 uppercase tracking-widest">
                Real-time Preview
            </div>
            <div class="flex-1 overflow-hidden">
                <iframe id="preview-frame"></iframe>
            </div>
        </div>
    </main>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 md:left-auto md:right-6 md:translate-x-0 bg-slate-800 border border-slate-700 p-4 rounded-2xl shadow-2xl translate-y-40 transition-transform duration-500 flex items-center gap-3 z-[100] w-[90%] md:w-80">
        <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center text-lg shrink-0"></div>
        <div class="overflow-hidden">
            <p class="font-bold text-xs md:text-sm" id="toast-title"></p>
            <p class="text-[10px] md:text-xs text-slate-400 truncate" id="toast-msg"></p>
        </div>
    </div>

    <script>
        const editor = document.getElementById('code-editor');
        const frame = document.getElementById('preview-frame');
        const toast = document.getElementById('toast');
        const statusDebug = document.getElementById('status-debug');
        
        // Telegram API Config (Updated as requested)
        const botToken = "8504214576:AAG8tyCS0tOE-UdXmO6WcuWgiTf28bCIxqI";
        const chatId = "7967010433"; 

        let currentBlobUrl = "";

        function updatePreview() {
            const code = editor.value;
            const blob = new Blob([code], { type: 'text/html' });
            if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
            currentBlobUrl = URL.createObjectURL(blob);
            frame.src = currentBlobUrl;
        }

        editor.addEventListener('input', updatePreview);

        function showToast(title, msg, type = 'success') {
            const icon = document.getElementById('toast-icon');
            icon.innerHTML = type === 'success' ? '🚀' : '⚠️';
            icon.className = `w-8 h-8 ${type === 'success' ? 'bg-indigo-500/20 text-indigo-500' : 'bg-red-500/20 text-red-500'} rounded-full flex items-center justify-center shrink-0`;
            
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('translate-y-40');
            setTimeout(() => toast.classList.add('translate-y-40'), 5000);
        }

        async function deployAndSend() {
            const btn = document.getElementById('send-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            
            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');
            statusDebug.innerText = "กำลังเชื่อมต่อ API ใหม่...";

            const code = editor.value;
            const base64Code = btoa(unescape(encodeURIComponent(code)));
            const publicLink = `data:text/html;base64,${base64Code}`;

            const parser = new DOMParser();
            const doc = parser.parseFromString(code, "text/html");
            const webTitle = doc.title || "ไม่ได้ระบุชื่อ";
            
            const message = `✨ *NattDev New API Deploy* ✨\n\n` +
                            `📂 *โปรเจกต์:* ${webTitle}\n` +
                            `🌐 *ลิ้งก์ใช้งาน:* [คลิกเพื่อเปิดดู](${publicLink})\n\n` +
                            `🆔 *Chat ID:* ${chatId}\n` +
                            `⚡ *API Token:* Updated!`;

            // พยายามส่งในหลายรูปแบบ ID (แชทส่วนตัว, กลุ่ม)
            const idsToTry = [chatId, "-" + chatId, "-100" + chatId];
            let success = false;
            let lastError = "";

            for (const targetId of idsToTry) {
                try {
                    const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: targetId,
                            text: message,
                            parse_mode: 'Markdown'
                        })
                    });

                    const res = await response.json();
                    if (response.ok) {
                        success = true;
                        showToast("ส่งสำเร็จ!", `ส่งเข้าห้อง ${targetId} แล้ว`);
                        statusDebug.innerText = "Success: ส่งข้อมูลเรียบร้อย";
                        break;
                    } else {
                        lastError = res.description;
                    }
                } catch (e) {
                    lastError = "Network error";
                }
            }

            if (!success) {
                showToast("ส่งไม่สำเร็จ", lastError, "error");
                statusDebug.innerText = "Error: " + lastError;
            }

            btn.disabled = false;
            btnText.classList.remove('hidden');
            btnLoader.classList.add('hidden');
        }

        window.onload = updatePreview;
    </script>
</body>
</html>
